# This is a Databricks asset bundle definition for dbw_asset_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dbw_asset_bundle
  uuid: 2b89ac38-a8d9-478b-960b-b7d61f51cd59

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405617142911558.18.azuredatabricks.net
    variables:
      catalog: main
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-7405617142911558.18.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/afia.fosu@avanade.com to make sure we only have a single copy.
      root_path: /Workspace/Users/afia.fosu@avanade.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: prod
    permissions:
      - user_name: afia.fosu@avanade.com
        level: CAN_MANAGE
